<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotX Login</title>
    <style>
        :root {
            --bg-soft: #ececed;
            --bg-warm: #f2b689;
            --accent: #d85d1e;
            --accent-deep: #b33a17;
            --accent-soft: #f39a5c;
            --ink: #1d2433;
            --muted: #5f6878;
            --card: rgba(255, 255, 255, 0.96);
            --line: #e7e9ef;
            --success: #18804a;
            --error: #b3203a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: "Avenir Next", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(160deg, rgba(245, 246, 249, 0.7), rgba(237, 239, 245, 0.86)),
                url("assets/images/spotx-loader-poster.svg") center/cover no-repeat fixed;
            display: grid;
            place-items: center;
            padding: 14px;
            position: relative;
            overflow: hidden;
            animation: pageIn 560ms ease;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 65%, rgba(245, 147, 69, 0.18), rgba(18, 21, 31, 0.34));
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            width: 460px;
            height: 460px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 190, 120, 0.55), rgba(255, 190, 120, 0));
            left: -120px;
            top: -80px;
            pointer-events: none;
            z-index: 0;
            animation: driftGlow 7s ease-in-out infinite;
        }

        .wrap {
            width: min(430px, 100%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.76));
            border: 1px solid rgba(208, 212, 223, 0.7);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 14px 32px rgba(32, 34, 44, 0.16);
            position: relative;
            z-index: 1;
            animation: cardEnter 520ms ease, floatCard 6s ease-in-out infinite;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 14px 16px;
            background: linear-gradient(130deg, #ffffff, #f3f4f8);
            border-bottom: 1px solid var(--line);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 34px;
            height: 34px;
            object-fit: contain;
            display: block;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.22rem;
            line-height: 1;
            color: var(--accent-deep);
            letter-spacing: 0.01em;
        }

        .brand p {
            margin: 2px 0 0;
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 600;
        }

        .panel {
            background: var(--card);
            border-radius: 24px 24px 0 0;
            padding: 18px 16px 20px;
            background-image: linear-gradient(180deg, #eb6c27 0%, #ea661f 35%, #f57c23 100%);
            background-size: 100% 100%;
            animation: panelShift 4.2s ease-in-out infinite;
        }

        .panel-head {
            color: #fff;
            margin-bottom: 14px;
        }

        .panel-head h2 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 800;
        }

        .panel-head p {
            margin: 3px 0 0;
            font-size: 0.83rem;
            color: rgba(255, 255, 255, 0.88);
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(255, 255, 255, 0.22);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 14px;
        }

        .tab {
            border: 0;
            border-radius: 12px;
            min-height: 42px;
            padding: 8px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            background: transparent;
            cursor: pointer;
            transition: transform 150ms ease, background-color 150ms ease;
        }

        .tab:hover {
            transform: translateY(-1px);
        }

        .tab.active {
            background: #ffffff;
            color: var(--accent-deep);
            transform: translateY(-0.5px);
        }

        form {
            display: none;
            gap: 10px;
            animation: fadeIn 260ms ease;
            background: #fff;
            border-radius: 16px;
            padding: 12px;
        }

        form.active {
            display: grid;
        }

        label {
            font-weight: 700;
            font-size: 0.83rem;
            color: #3a4354;
            margin-bottom: -2px;
        }

        input {
            width: 100%;
            border: 1px solid #dbe1ea;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            background: #f9fbff;
            color: #2b3442;
        }

        input:focus {
            outline: 2px solid rgba(216, 93, 30, 0.24);
            border-color: var(--accent-soft);
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 6px;
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            min-height: 44px;
            flex: 1;
            transition: transform 150ms ease, box-shadow 180ms ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 16px rgba(17, 23, 37, 0.16);
        }

        .btn-primary {
            background: linear-gradient(120deg, var(--accent), var(--accent-deep));
            color: #fff;
        }

        .btn-ghost {
            background: #f2f5fa;
            color: #4c586c;
            border: 1px solid #d9e0ea;
        }

        .hint {
            font-size: 0.78rem;
            color: #5f6a7d;
        }

        .status {
            min-height: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--error);
        }

        .loader-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: grid;
            place-items: center;
            background: rgba(17, 22, 33, 0.78);
            opacity: 0;
            visibility: hidden;
            transition: opacity 220ms ease;
            padding: 16px;
        }

        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loader-card {
            width: min(420px, 100%);
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
            animation: loaderPop 260ms ease;
        }

        .loader-poster {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
            background: linear-gradient(180deg, #f8f0e8, #f2b689);
        }

        .loader-meta {
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .loader-meta p {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 700;
            color: #2b3442;
        }

        .loader-dots {
            display: inline-flex;
            gap: 5px;
            align-items: center;
        }

        .loader-dots span {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #e06d2d;
            animation: pulse 1s infinite ease-in-out;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: 120ms;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: 240ms;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @keyframes pageIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes floatCard {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes panelShift {
            0%,
            100% {
                background-position: 50% 50%;
            }
            50% {
                background-position: 50% 46%;
            }
        }

        @keyframes driftGlow {
            0%,
            100% {
                transform: translate3d(0, 0, 0);
            }
            50% {
                transform: translate3d(30px, 14px, 0);
            }
        }

        @keyframes loaderPop {
            from {
                transform: scale(0.96);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 8px;
            }

            .wrap {
                width: 100%;
                border-radius: 20px;
            }

            .topbar {
                padding: 12px;
            }

            .brand-logo {
                width: 30px;
                height: 30px;
            }

            .panel {
                border-radius: 20px 20px 0 0;
                padding: 14px 12px 16px;
            }

            .brand h1 {
                font-size: 1.1rem;
            }

            .panel-head h2 {
                font-size: 1.05rem;
            }

            .panel-head p {
                font-size: 0.76rem;
            }

            form {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .actions .btn {
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="loader-overlay" id="loader" aria-hidden="true">
        <div class="loader-card" role="status" aria-live="polite">
            <img
                id="loader-poster"
                class="loader-poster"
                src="assets/images/spotx-loader-poster.svg"
                alt="SpotX poster"
            >
            <div class="loader-meta">
                <p id="loader-text">Signing you in...</p>
                <div class="loader-dots" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <main class="wrap">
        <header class="topbar" aria-label="SpotX header">
            <div class="brand">
                <img class="brand-logo" src="assets/images/spotx-logo.svg" alt="SpotX logo">
                <div>
                    <h1>SpotX</h1>
                    <p>Know where to go</p>
                </div>
            </div>
        </header>

        <section class="panel" aria-label="Login panel">
            <div class="panel-head">
                <h2>Welcome Back</h2>
                <p>Select account type and sign in to continue.</p>
            </div>
            <div class="tabs" role="tablist" aria-label="Login types">
                <button class="tab active" id="user-tab" data-target="user-form" role="tab" aria-selected="true">User Login</button>
                <button class="tab" id="business-tab" data-target="business-form" role="tab" aria-selected="false">Business Login</button>
            </div>

            <form id="user-form" class="active" novalidate>
                <label for="user-username">Username</label>
                <input id="user-username" name="username" autocomplete="username" required>

                <label for="user-password">Password</label>
                <input id="user-password" name="password" type="password" autocomplete="current-password" required>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Sign In as User</button>
                    <button class="btn btn-ghost" type="button" data-fill="user">Use Test Credentials</button>
                </div>

                <div class="hint">User credentials: <strong>user / 1234</strong></div>
                <div class="status" id="user-status" aria-live="polite"></div>
            </form>

            <form id="business-form" novalidate>
                <label for="business-username">Username</label>
                <input id="business-username" name="username" autocomplete="username" required>

                <label for="business-password">Password</label>
                <input id="business-password" name="password" type="password" autocomplete="current-password" required>

                <div class="actions">
                    <button class="btn btn-primary" type="submit">Sign In as Business</button>
                    <button class="btn btn-ghost" type="button" data-fill="business">Use Test Credentials</button>
                </div>

                <div class="hint">Business credentials: <strong>admin / 1234</strong></div>
                <div class="status" id="business-status" aria-live="polite"></div>
            </form>
        </section>
    </main>

    <script>
        const credentials = {
            user: { username: "user", password: "1234" },
            business: { username: "admin", password: "1234" }
        };

        const loader = document.getElementById("loader");
        const loaderText = document.getElementById("loader-text");
        const loaderPoster = document.getElementById("loader-poster");
        const tabs = document.querySelectorAll(".tab");
        const forms = document.querySelectorAll("form");

        loaderPoster.addEventListener("error", () => {
            loaderPoster.alt = "SpotX loading poster unavailable";
        });

        function switchTab(targetFormId) {
            tabs.forEach((tab) => {
                const isActive = tab.dataset.target === targetFormId;
                tab.classList.toggle("active", isActive);
                tab.setAttribute("aria-selected", String(isActive));
            });

            forms.forEach((form) => {
                const active = form.id === targetFormId;
                form.classList.toggle("active", active);
            });
        }

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => switchTab(tab.dataset.target));
        });

        function setStatus(el, message, type) {
            el.textContent = message;
            el.classList.remove("success", "error");
            if (type) {
                el.classList.add(type);
            }
        }

        function showLoader(role) {
            loaderText.textContent = "Loading " + role + " dashboard...";
            loader.classList.add("active");
            loader.setAttribute("aria-hidden", "false");
        }

        function bindLogin(formId, role) {
            const form = document.getElementById(formId);
            const status = document.getElementById(role + "-status");

            form.addEventListener("submit", (event) => {
                event.preventDefault();
                const username = form.username.value.trim();
                const password = form.password.value.trim();
                const valid = credentials[role].username === username && credentials[role].password === password;

                if (valid) {
                    setStatus(status, "Login successful. Redirecting to " + role + " dashboard...", "success");
                    showLoader(role);
                    setTimeout(() => {
                        window.location.href = "mainpage.html?role=" + encodeURIComponent(role);
                    }, 1400);
                } else {
                    setStatus(status, "Invalid credentials. Please try again.", "error");
                }
            });
        }

        bindLogin("user-form", "user");
        bindLogin("business-form", "business");

        document.querySelectorAll("[data-fill]").forEach((button) => {
            button.addEventListener("click", () => {
                const role = button.dataset.fill;
                const form = document.getElementById(role + "-form");
                form.username.value = credentials[role].username;
                form.password.value = credentials[role].password;
                setStatus(document.getElementById(role + "-status"), "Credentials filled. Click Sign In.", "");
            });
        });
    </script>
</body>
</html>
